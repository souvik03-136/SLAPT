services:
  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    depends_on:
      parser:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - slapt-net

  web:
    build:
      context: ./services/web
    environment:
      - PARSER_URL=http://parser:3001
      - NODE_ENV=production
    networks:
      - slapt-net
    depends_on:
      parser:
        condition: service_healthy

  parser:
    build:
      context: ./services/parser
    environment:
      - PORT=3001
      - NODE_ENV=production
    networks:
      - slapt-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  slapt-net:
    driver: bridge