version: '3'

vars:
  PARSER_DIR: services/parser
  WEB_DIR: services/web
  TESTS_DIR: tests

tasks:

  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  # ── Docker ────────────────────────────────────────────────────────────────

  run:
    desc: Build and start all services (Docker)
    cmds:
      - docker compose up --build

  run:detached:
    desc: Build and start all services in background
    aliases: [run:d]
    cmds:
      - docker compose up --build -d
      - echo "Services running at http://localhost"

  stop:
    desc: Stop all running services
    cmds:
      - docker compose down

  stop:clean:
    desc: Stop all services and remove volumes + images
    aliases: [nuke]
    cmds:
      - docker compose down --volumes --rmi local
      - echo "All containers, volumes, and local images removed"

  restart:
    desc: Restart all services
    deps: [stop]
    cmds:
      - task: run

  log:
    desc: "Tail logs from all services (usage: task log or task log -- parser)"
    cmds:
      - docker compose logs -f {{.CLI_ARGS}}

  logs:parser:
    desc: Tail parser service logs
    cmds:
      - docker compose logs -f parser

  logs:web:
    desc: Tail web service logs
    cmds:
      - docker compose logs -f web

  ps:
    desc: Show running service containers
    cmds:
      - docker compose ps

  # ── Dev (no Docker) ───────────────────────────────────────────────────────

  dev:parser:
    desc: Run parser in dev mode (hot reload)
    dir: '{{.PARSER_DIR}}'
    cmds:
      - npm run dev

  dev:web:
    desc: Run web frontend in dev mode (hot reload)
    dir: '{{.WEB_DIR}}'
    cmds:
      - npm run dev

  # ── Install ───────────────────────────────────────────────────────────────

  install:
    desc: Install dependencies for all services and tests
    deps:
      - install:parser
      - install:web
      - install:tests

  install:parser:
    desc: Install parser dependencies
    dir: '{{.PARSER_DIR}}'
    cmds:
      - npm install

  install:web:
    desc: Install web dependencies
    dir: '{{.WEB_DIR}}'
    cmds:
      - npm install

  install:tests:
    desc: Install test dependencies
    dir: '{{.TESTS_DIR}}'
    cmds:
      - npm install

  # ── Build ─────────────────────────────────────────────────────────────────

  build:
    desc: Build both services for production
    deps:
      - build:parser
      - build:web

  build:parser:
    desc: Compile parser TypeScript to dist/
    dir: '{{.PARSER_DIR}}'
    cmds:
      - npm run build

  build:web:
    desc: Build web frontend for production
    dir: '{{.WEB_DIR}}'
    cmds:
      - npm run build

  # ── Tests ─────────────────────────────────────────────────────────────────

  test:
    desc: Run all tests (parser must be running – use task test:full for auto-start)
    dir: '{{.TESTS_DIR}}'
    cmds:
      - npm test

  test:unit:
    desc: Run unit tests only (lexer + error validation, no server needed)
    dir: '{{.TESTS_DIR}}'
    cmds:
      - node --test --require ts-node/register lexer.test.ts errors.test.ts

  test:lexer:
    desc: Run lexer tests only
    dir: '{{.TESTS_DIR}}'
    cmds:
      - npm run test:lexer

  test:errors:
    desc: Run error validation tests only
    dir: '{{.TESTS_DIR}}'
    cmds:
      - npm run test:errors

  test:api:
    desc: Run API integration tests (parser must be running)
    dir: '{{.TESTS_DIR}}'
    cmds:
      - npm run test:api

  test:full:
    desc: Start parser in Docker then run all tests, then stop
    cmds:
      - docker compose up -d --build parser
      - defer: docker compose stop parser
      - node -e "
          const http = require('http');
          const MAX = 30;
          let attempts = 0;
          function check() {
            attempts++;
            const req = http.get('http://localhost:3001/health', (res) => {
              if (res.statusCode === 200) {
                console.log('Parser is healthy after ' + attempts + ' attempt(s)');
                process.exit(0);
              } else {
                retry();
              }
            });
            req.on('error', retry);
            req.end();
          }
          function retry() {
            if (attempts >= MAX) {
              console.error('Parser failed to become healthy after ' + MAX + ' attempts');
              process.exit(1);
            }
            setTimeout(check, 1000);
          }
          check();
        "
      - task: test

  # ── Type checking ─────────────────────────────────────────────────────────

  check:
    desc: Type-check both services
    deps:
      - check:parser
      - check:web

  check:parser:
    desc: Type-check parser service
    dir: '{{.PARSER_DIR}}'
    cmds:
      - npx tsc --noEmit

  check:web:
    desc: Type-check web service
    dir: '{{.WEB_DIR}}'
    cmds:
      - npm run check

  # ── Health ────────────────────────────────────────────────────────────────

  health:
    desc: POST a test payload to the parse endpoint (via nginx)
    cmds:
      - |
        node -e "const http=require('http');const body=JSON.stringify({code:'@genre lofi-hiphop'});const req=http.request({hostname:'localhost',port:80,path:'/api/parse',method:'POST',headers:{'Content-Type':'application/json','Content-Length':Buffer.byteLength(body)}},(res)=>{let d='';res.on('data',(c)=>d+=c);res.on('end',()=>console.log(d));});req.on('error',(e)=>{console.error('Request failed:',e.message);process.exit(1);});req.write(body);req.end();"

  health:parser:
    desc: Hit the parser /health endpoint directly (parser must be running)
    cmds:
      - |
        node -e "const http=require('http');http.get('http://localhost:3001/health',(res)=>{let d='';res.on('data',(c)=>d+=c);res.on('end',()=>console.log(d));}).on('error',(e)=>{console.error('Request failed:',e.message);process.exit(1);});"

  # ── Cleanup ───────────────────────────────────────────────────────────────

  clean:
    desc: Remove all build artifacts (dist/, build/, .svelte-kit/)
    cmds:
      - |
        node -e "const fs=require('fs');['{{.PARSER_DIR}}/dist','{{.WEB_DIR}}/build','{{.WEB_DIR}}/.svelte-kit'].forEach(p=>{try{fs.rmSync(p,{recursive:true,force:true});console.log('Removed '+p);}catch(e){console.log('Skipped '+p);}});"
        - echo "Build artifacts removed"

  clean:deps:
    desc: Remove all node_modules across all services and tests
    cmds:
      - |
        node -e "const fs=require('fs');['{{.PARSER_DIR}}/node_modules','{{.WEB_DIR}}/node_modules','{{.TESTS_DIR}}/node_modules'].forEach(p=>{try{fs.rmSync(p,{recursive:true,force:true});console.log('Removed '+p);}catch(e){console.log('Skipped '+p);}});"
        - echo "All node_modules removed"

  clean:all:
    desc: Remove everything - artifacts, deps, Docker volumes
    deps: [clean, clean:deps]
    cmds:
      - docker compose down --volumes --rmi local
      - echo "All containers, volumes, and local images removed"